name: Update CHMI Local Data

on:
  workflow_dispatch:
    inputs:
      year:
        description: "Rok pro recent datasety (YYYY). Pokud je prázdné, použije se aktuální rok UTC."
        required: false
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download CHMI datasets
        shell: bash
        run: |
          set -euo pipefail

          STATION_WSI="0-203-0-11656"
          INPUT_YEAR="${{ github.event.inputs.year }}"
          if [[ -n "${INPUT_YEAR}" ]]; then
            YEAR="${INPUT_YEAR}"
          else
            YEAR="$(date -u +%Y)"
          fi

          if [[ ! "${YEAR}" =~ ^[0-9]{4}$ ]]; then
            echo "Neplatný rok: ${YEAR}" >&2
            exit 1
          fi

          python3 scripts/update_chmi_local_data.py \
            --station "${STATION_WSI}" \
            --year "${YEAR}" \
            --out data/chmi

      - name: Commit and push data branch
        shell: bash
        run: |
          set -euo pipefail

          YEAR="${{ github.event.inputs.year }}"
          if [[ -z "${YEAR}" ]]; then
            YEAR="$(date -u +%Y)"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/chmi
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi

          git commit -m "chore: update CHMI local datasets (${YEAR})"
          git push origin HEAD:main
