name: Update CHMI Local Data

on:
  workflow_dispatch:
    inputs:
      year:
        description: "Rok pro recent datasety (YYYY). Pokud je prázdné, použije se aktuální rok UTC."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download CHMI datasets
        shell: bash
        run: |
          set -euo pipefail

          STATION_WSI="0-203-0-11656"
          INPUT_YEAR="${{ github.event.inputs.year }}"
          if [[ -n "${INPUT_YEAR}" ]]; then
            YEAR="${INPUT_YEAR}"
          else
            YEAR="$(date -u +%Y)"
          fi

          if [[ ! "${YEAR}" =~ ^[0-9]{4}$ ]]; then
            echo "Neplatný rok: ${YEAR}" >&2
            exit 1
          fi

          python3 scripts/update_chmi_local_data.py \
            --station "${STATION_WSI}" \
            --year "${YEAR}" \
            --out data/chmi

      - name: Create Pull Request with data update
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update CHMI local datasets"
          title: "chore: update CHMI local datasets"
          body: |
            Automated on-demand update of local CHMI datasets.
            - historical: `data/chmi/historical/dly-0-203-0-11656.json`
            - recent: `data/chmi/recent/<year>/...`
          add-paths: |
            data/chmi
          branch: chore/update-chmi-local-data
          delete-branch: true
